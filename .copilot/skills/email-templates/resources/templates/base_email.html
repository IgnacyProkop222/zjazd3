<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body { font-family: Arial, sans-serif; color: #333; }
      .content { margin: 20px; }
      .footer { font-size: 12px; color: #777; }
    </style>
  </head>
  <body>
    <div class="content">
      {% block body %}{% endblock %}
    </div>
    <div class="footer">
      {% block footer %}This email was sent by Mailer{% endblock %}
    </div>
  </body>
</html>
